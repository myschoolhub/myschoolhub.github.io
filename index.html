<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline AI Chat</title>
  <style>
    body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; margin: 50px; background: #f5f5f5; }
    h1 { margin-bottom: 20px; }
    #chat { width: 500px; height: 400px; border: 1px solid #ccc; border-radius: 8px; padding: 10px; overflow-y: auto; background: #fff; }
    #input { width: 500px; margin-top: 10px; padding: 8px; border-radius: 5px; border: 1px solid #ccc; }
    .user { color: #007bff; }
    .ai { color: #28a745; }
    .thinking { font-style: italic; color: #888; }
  </style>
</head>
<body>
  <h1>Offline AI Chat</h1>
  <div id="chat"></div>
  <input type="text" id="input" placeholder="Type your message..." />
  <script type="module">
    import { CreateMLCEngine } from 'https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm@0.2.79/dist/webllm.min.js';

    const chatEl = document.getElementById('chat');
    const inputEl = document.getElementById('input');

    async function initModel() {
      const model = new CreateMLCEngine('Llama-3-8B-Instruct-q4f32_1-MLC', {
        initProgressCallback: ({ progress }) => console.log(progress),
      });
      await model.load();
      return model;
    }

    const model = await initModel();

    inputEl.addEventListener('keypress', async (e) => {
      if (e.key === 'Enter' && inputEl.value.trim() !== '') {
        const userMsg = inputEl.value.trim();
        chatEl.innerHTML += `<div class="user"><b>You:</b> ${userMsg}</div>`;
        inputEl.value = '';
        chatEl.innerHTML += `<div class="thinking">AI is thinking...</div>`;
        chatEl.scrollTop = chatEl.scrollHeight;

        const aiResponse = await model.generate(userMsg);
        chatEl.innerHTML = chatEl.innerHTML.replace('<div class="thinking">AI is thinking...</div>', '');
        chatEl.innerHTML += `<div class="ai"><b>AI:</b> ${aiResponse}</div>`;
        chatEl.scrollTop = chatEl.scrollHeight;
      }
    });

    // --- Service Worker Registration ---
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(() => {
        console.log('Service Worker registered for offline use');
      }).catch(console.error);
    }
  </script>
</body>
</html>
